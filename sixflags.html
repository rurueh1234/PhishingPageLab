<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة سحب لتذاكر Six Flags</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Tahoma", Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
    url("background.png") center/cover no-repeat;
    overflow:auto;
}

.container{
    width:90%;
    max-width:700px;
    text-align:center;
    color:#fff;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:25px;
    padding:45px;
    box-shadow:0 20px 40px rgba(0,0,0,.45);
    animation:fadeUp 1.2s ease;
    margin:40px 0;
}

.badge{
    display:inline-block;
    background:#ff0055;
    padding:10px 22px;
    border-radius:40px;
    font-size:15px;
    font-weight:bold;
    margin-bottom:20px;
    box-shadow:0 0 20px #ff005580;
}

h1{
    font-size:48px;
    margin-bottom:20px;
    line-height:1.3;
    text-shadow:0 0 20px rgba(255,255,255,.4);
}

.highlight{
    color:#FFD700;
}

p{
    font-size:20px;
    line-height:1.9;
    margin-bottom:35px;
    color:#f5f5f5;
}

/* FORM */

form{
    display:flex;
    flex-direction:column;
    gap:18px;
    margin-top:25px;
}

form input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:17px;
    background:rgba(255,255,255,.95);
    outline:none;
    transition:.3s;
}

form input:focus{
    box-shadow:0 0 10px #FFD700;
}

button{
    width:100%;
    padding:18px;
    font-size:20px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff0055,#ff7b00);
    color:white;
    cursor:pointer;
    transition:.35s;
    box-shadow:0 10px 25px rgba(255,0,85,.4);
}

button:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 15px 35px rgba(255,123,0,.6);
}

.note{
    margin-top:30px;
    font-size:15px;
    color:#ddd;
}

.glow{
    position:fixed;
    width:350px;
    height:350px;
    background:#ff006a;
    filter:blur(170px);
    opacity:.25;
    top:-80px;
    left:-80px;
}

.glow2{
    position:fixed;
    width:300px;
    height:300px;
    background:#00bfff;
    filter:blur(150px);
    opacity:.2;
    bottom:-80px;
    right:-80px;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    h1{
        font-size:34px;
    }

    p{
        font-size:18px;
    }

    .container{
        padding:30px;
    }
}
</style>

</head>
<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="container">

<div class="badge">
🎉 فرصة لا تُفوّت!
</div>

<h1>
اربح <span class="highlight">تذكرتين مجانًا</span><br>
إلى مدينة <span class="highlight">Six Flags</span>
</h1>

<p>
هل أنت مستعد ليوم مليء بالإثارة والمغامرات؟<br>
شارك الآن في السحب وادخل الفرصة للفوز بتذكرتين إلى
<strong>Six Flags</strong>.<br>
قد يكون اسمك هو الفائز القادم!
</p>

<form onsubmit="showMessage(event)">

<input type="text" placeholder="الاسم الكامل" required>

<input type="tel" placeholder="رقم الجوال" required>

<input type="email" placeholder="البريد الإلكتروني" required>

<button type="submit">
🎢 شارك في السحب الآن
</button>

</form>

<div class="note">
سيتم الإعلان عن الفائز بعد انتهاء فترة المسابقة.
</div>

</div>

<script>
function showMessage(event){
    event.preventDefault();

    alert("This is a phishing page!!!");
}
</script>

</body>
</html>
